<form
  class="rounded-xl overflow-hidden bg-white"
  action=""
>
    <div class="flex gap-1 items-center p-4">
        <img src="images/icon-new-task.svg" />
        <h1 class="font-semibold text-lg">
            Criar/Editar tarefa
        </h1>
        <img
          class="ml-auto cursor-pointer" 
          src="images/icon-close.svg"
        />
    </div>
    <div class="p-4 border-y border-[#d1d5db] flex flex-col gap-4">
        <div class="flex flex-col gap-2">
            <label for="name" class="font-semibold text-sm">
                Nome
            </label>
            <input 
              type="text"
              id="name"
              placeholder="Descreva o que deverá ser feito"
              class="w-full border border-[#d1d5db] p-3 rounded-lg text-sm font-light text-[#89919f]"
            />
            <p class="font-semibold text-sm text-red-500">
                O campo é obrigatório e deve ter no mínimo 10 caracteres.
            </p>
        </div>
        <div class="flex flex-col gap-2">
            <label for="description" class="font-semibold text-sm">
                Descrição
            </label>
            <input 
              type="text"
              id="description"
              placeholder="Adicione uma descrição"
              class="w-full border border-[#d1d5db] p-3 rounded-lg text-sm font-light text-[#89919f]"
            />
            <p class="font-semibold text-sm text-red-500">
                O campo é obrigatório e deve ter no mínimo 10 caracteres.
            </p>
        </div>
    </div>
    <div class="flex justify-end gap-2 p-4">
        <button 
          type="button"
          class="py-3 px-4 bg-[#fafafa] rounded-xl text-sm font-semibold cursor-pointer 
          active:translate-y-1 transition-transform duration-75"
        >
          Cancelar
        </button>
        <button 
          type="submit"
          class="py-3 px-4 bg-[#2a89ef] text-white rounded-xl text-sm font-semibold cursor-pointer 
          active:translate-y-1 transition-transform duration-75 shadow-md shadow-blue-500/50"
        >
          Criar uma tarefa
        </button>
    </div>
</form>
