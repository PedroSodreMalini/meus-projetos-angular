<div class="rounded-2xl bg-[#ecf4fe] p-8 gap-7 flex flex-col lg:flex-row-reverse lg:justify-between lg:items-center">
    <img
      class="w-29.5 h-29.5"
      src="images/icon-hand-coding.svg"
      alt="Icon Hand Coding"
    />
    <div class="flex flex-col gap-4 max-w-[278px] lg:max-w-none w-full ">
        <div class="flex flex-col gap-2">
            <h2 class="font-bold text-2xl text-left">
                Bem vinda de volta, Jennie
            </h2>
            <h3 class="font-medium opacity-80 leading-6 text-left text-base">
                Não se esqueça de atualizar as tarefas
            </h3>
        </div>
        <button
          (click)="openNewTaskModal()" 
          class="bg-[#2a89ef] w-fit shadow-md flex gap-2 shadow-blue-500/30 py-3 
        px-4 rounded-xl text-white text-sm font-semibold text-center cursor-pointer 
        active:translate-y-1 transition-transform duration-75">
            <img src="images/icon-plus-circle.svg" />
            Criar uma tarefa
        </button>
    </div>
</div>
