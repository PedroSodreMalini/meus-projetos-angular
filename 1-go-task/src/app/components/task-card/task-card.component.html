<div class="p-3 bg-[#fafafa] rounded-xl cursor-grab flex flex-col gap-3">
    <div class="flex gap-1">
        <p class="font-semibold" [title]="task.name">
            {{ task.name.length < 20 ? task.name : (task.name | slice:0:20 ) + "..."}}
        </p>
        <img 
          src="images/icon-delete.svg"
          alt="Deletar tarefa"
          class="self-start cursor-pointer ml-auto"
          (click)="deleteTask()" 
        />
    </div>
    <p class="font-light text-sm break-words" [title]="task.description">
        {{ task.description.length < 100 
        ? task.description 
        : (task.description | slice:0:100 ) + "..."}}
    </p>
    <div class="flex items-center gap-1">
        <img 
          src="images/icon-comments.svg"
          alt="Ícone de comentário"
        />
        <p
          (click)="openTaskCommentsModal()" 
          class="font-semibold text-xs text-[#2a89ef] underline underline-offset-2 
          cursor-pointer">
            {{ task.comments.length }} comentários
        </p>
        <p
          (click)="openEditTaskModal()" 
          class="font-semibold text-xs text-[#2a89ef] underline underline-offset-2 
        cursor-pointer ml-auto">
            Editar
        </p>
    </div>
</div>
