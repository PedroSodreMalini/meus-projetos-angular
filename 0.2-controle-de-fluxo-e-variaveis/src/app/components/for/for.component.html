<h2>FOR COMPONENT</h2>
<button (click)="atualizarLista()" >
    Atualizar lista
</button>
<h3>Lista de produtos</h3>
<!-- TRack é o key do react -->
@for(product of products; track product.id) { 
    <div>
        <h4>{{product.name}}</h4>
        <p>R$ {{product.price | number : "1.2-2"}}</p>
        <button (click)="removerProduto(product.id)">Remover</button>
    </div>
} @empty {
    <p>Nenhum produto.</p>
}
